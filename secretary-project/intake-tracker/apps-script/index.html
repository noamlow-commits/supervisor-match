<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<base target="_top">
<style>
  :root{
    --bg:#f4f6f8; --panel:#ffffff; --ink:#1f2d3a; --muted:#6b7b8a;
    --line:#e2e8ee; --teal:#2c7a7b; --teal-d:#225e5f; --slate:#1f3a4d;
    --warn:#c98a00; --warn-bg:#fff7e0; --closed:#9aa7b1; --ok:#2f855a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  header{background:var(--slate);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:600}
  header .sp{flex:1}
  .tabs button,.btn{background:#ffffff22;color:#fff;border:1px solid #ffffff44;border-radius:7px;padding:7px 13px;cursor:pointer;font-size:13px}
  .tabs button.active{background:#fff;color:var(--slate);font-weight:600}
  .btn{background:var(--teal);border-color:var(--teal)}
  .btn:hover{background:var(--teal-d)}
  .bar{display:flex;gap:10px;align-items:center;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
  select,input,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;background:#fff}
  /* board: fixed viewport height, each column scrolls internally (no endless page scroll) */
  .board{display:flex;gap:10px;padding:12px 14px;overflow-x:auto;overflow-y:hidden;align-items:stretch;height:calc(100vh - 112px)}
  .board::after{content:'';flex:0 0 6px}   /* end spacer so last column isn't flush to the edge */
  .col{background:var(--panel);border:1px solid var(--line);border-radius:10px;width:230px;min-width:210px;flex:0 0 auto;display:flex;flex-direction:column;max-height:100%}
  .col h3{margin:0;padding:9px 11px;font-size:12.5px;border-bottom:1px solid var(--line);background:var(--panel);border-radius:10px 10px 0 0;flex:0 0 auto}
  .col h3 .n{color:var(--muted);font-weight:400}
  .cards{padding:7px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1 1 auto;min-height:24px}
  .card{position:relative;border:1px solid var(--line);border-left:4px solid var(--line);border-radius:7px;padding:7px 9px;cursor:pointer;background:#fff;transition:.1s}
  .card:hover{box-shadow:0 1px 6px #0002}
  .card[draggable=true]{cursor:grab}
  .card.dragging{opacity:.45;cursor:grabbing}
  .col.drop-hover{outline:2px dashed var(--teal);outline-offset:-2px;background:#f0faf9}
  .card.age1{outline:2px solid #e8a33d;outline-offset:-1px}
  .card.age2{outline:2px solid #d64545;outline-offset:-1px}
  .card.hit{outline:3px solid var(--teal);outline-offset:-1px;animation:hitflash 1s ease-out 2}
  @keyframes hitflash{0%{background:#d7f0ee}100%{background:#fff}}
  .ic-btn{cursor:pointer;font-size:13px;opacity:.7;text-decoration:none}
  .ic-btn:hover{opacity:1}
  .card.rem{background:var(--warn-bg)}
  .card .nm{font-weight:600;font-size:13px;word-break:break-word}
  .card .meta{color:var(--muted);font-size:11.5px;margin-top:2px;word-break:break-word}
  .pill{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:20px;background:#eef3f6;color:var(--slate);margin-top:4px}
  .pill.rem{background:#fde9b8;color:#7a5400}
  .pill.pay{background:#c6f6d5;color:#22543d}
  .pill.wait{background:#fed7aa;color:#7b341e}
  .pill.gate{background:#fde2e2;color:#9b2c2c}
  #moodleAlert{background:#fff0e0;color:#9a4f00;border:1px solid #f0c890;border-radius:7px;padding:7px 12px;cursor:pointer;font-size:13px;font-weight:600;animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 #f0a85066}50%{box-shadow:0 0 0 5px #f0a85000}}
  /* cross-cutting table */
  .tbl-wrap{padding:12px 14px;height:calc(100vh - 112px);overflow:auto}
  .tbl-bar{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  table.cross{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  table.cross th{position:sticky;top:0;background:var(--slate);color:#fff;z-index:1;white-space:nowrap}
  table.cross td,table.cross th{border-bottom:1px solid var(--line);padding:5px 7px;text-align:center}
  table.cross td.nm{text-align:right;font-weight:600;white-space:nowrap}
  table.cross tr:hover td{background:#f0f6f7}
  .cell-ok{background:#e7f6ec;color:#1e7a44}
  .cell-pend{background:#fff3df;color:#9a6b00}
  .cell-no{color:#c0392b}
  .gate-row td.nm::after{content:' ⚠';color:#c0392b}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;vertical-align:middle;margin-left:3px}
  .legend{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  .legend .lg{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--muted)}
  @media(max-width:640px){ .col{width:80vw;min-width:80vw} .board{height:calc(100vh - 150px)} }
  /* בחירה מרובה + פילוח-גיל בעמודת המתעניינים */
  .card.sel{outline:2px solid var(--teal);outline-offset:-1px;background:#eafaf8}
  .selchk{position:absolute;top:6px;left:6px;width:16px;height:16px;cursor:pointer;z-index:2}
  .col h3 .colchk{vertical-align:middle;cursor:pointer;margin-left:4px}
  .agehdr{font-size:11px;font-weight:600;color:var(--muted);background:#eef3f6;border-radius:5px;padding:2px 8px;margin:4px 1px 1px;display:flex;align-items:center;gap:5px}
  #selBtn.on{background:var(--teal)!important;color:#fff!important;border-color:var(--teal)!important}
  #selbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--teal-d);color:#fff;padding:9px 14px;border-radius:10px;display:none;gap:12px;align-items:center;box-shadow:0 3px 14px #0005;z-index:50;font-size:13px}
  #selbar.show{display:flex}
  #selbar b{font-size:15px}
  #selbar button{background:#ffffff22;color:#fff;border:1px solid #ffffff66;border-radius:7px;padding:6px 11px;cursor:pointer;font-size:13px}
  #selbar button.pri{background:#fff;color:var(--teal-d);font-weight:600}
  /* dashboard */
  .dash{padding:18px;display:grid;gap:16px;grid-template-columns:1fr 1fr}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .panel h2{margin:0 0 10px;font-size:15px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:5px 7px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  .funnel td:first-child{white-space:nowrap}
  .barfill{height:10px;background:var(--teal);border-radius:5px;display:inline-block;vertical-align:middle}
  /* modal */
  .ov{position:fixed;inset:0;background:#0006;display:none;align-items:flex-start;justify-content:center;padding:30px 12px;overflow:auto}
  .ov.show{display:flex}
  .modal{background:#fff;border-radius:12px;width:min(640px,100%);padding:0;max-height:90vh;overflow:auto}
  .modal .mh{position:sticky;top:0;background:var(--slate);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;border-radius:12px 12px 0 0}
  .modal .mh h2{font-size:16px;margin:0;flex:1}
  .modal .mb{padding:14px 16px}
  .grp{margin-bottom:14px}
  .grp h4{margin:0 0 7px;font-size:12px;color:var(--teal-d);border-bottom:1px solid var(--line);padding-bottom:3px}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .f{display:flex;flex-direction:column;gap:3px}
  .f.full{grid-column:1/3}
  .f label{font-size:11px;color:var(--muted)}
  .f.chk{flex-direction:row;align-items:center;gap:6px}
  .mf{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:11px 16px;display:flex;gap:10px;justify-content:flex-start}
  .x{cursor:pointer;font-size:20px;line-height:1}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--slate);color:#fff;padding:9px 16px;border-radius:8px;display:none}
  .empty{color:var(--muted);text-align:center;padding:40px}
  .spin{color:var(--muted);padding:30px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>מעקב פניות · מכון רוטנברג</h1>
  <div class="tabs">
    <button id="tab-board" class="active" onclick="show('board')">לוח</button>
    <button id="tab-table" onclick="show('table')">טבלה רוחבית</button>
    <button id="tab-courses" onclick="show('courses')">קורסים</button>
    <button id="tab-dash" onclick="show('dash')">דשבורד</button>
    <button id="tab-contacts" onclick="show('contacts')">אנשי קשר</button>
    <button id="tab-report" onclick="show('report')">דוח פניות</button>
  </div>
  <button id="moodleAlert" onclick="show('courses')" style="display:none">📌 <span id="moodleCount">0</span> קורסים להכניס למודל</button>
  <span class="sp"></span>
  <button class="btn" onclick="doImport()" title="מושך רק פניות חדשות מהקובץ הישן — לא דורס מה שעדכנת כאן">⟳ משיכת חדשים מהארכיב</button>
  <button class="btn" onclick="openNew()">+ פנייה חדשה</button>
</header>

<div class="bar" id="bar">
  <label>תוכנית:</label>
  <select id="progFilter" onchange="render()"><option value="">כל התוכניות</option></select>
  <label><input type="checkbox" id="remOnly" onchange="render()"> רק שצריך תזכורת</label>
  <label><input type="checkbox" id="payOnly" onchange="render()"> ממתין לתשלום</label>
  <button id="selBtn" onclick="toggleSelMode()" title="בחירה מרובה של כרטיסים והעתקת הטלפונים לרשימה אחת לוואטסאפ" style="background:#fff;color:var(--slate);border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;font-size:13px">✔ בחירה מרובה</button>
  <span class="legend" id="legend"></span>
  <input id="search" placeholder="🔍 חיפוש שם/טלפון — מדגיש וקופץ" oninput="render()" style="margin-right:auto;width:210px">
</div>

<div id="view-board"><div class="board" id="board"><div class="spin">טוען…</div></div></div>
<div id="view-table" style="display:none"><div id="tableView"></div></div>
<div id="view-courses" style="display:none"><div class="dash" id="courses" style="grid-template-columns:1fr"></div></div>
<div id="view-dash" style="display:none"><div class="dash" id="dash"></div></div>
<div id="view-contacts" style="display:none"><div class="dash" id="contacts" style="grid-template-columns:1fr"></div></div>
<div id="view-report" style="display:none"><div id="reportView" style="padding:16px"></div></div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div id="selbar">
  <span>נבחרו <b id="selCount">0</b></span>
  <button class="pri" onclick="copySelectedPhones()">📋 העתק טלפונים</button>
  <button onclick="clearSel()">נקה</button>
  <button onclick="endSelection()">סגור בחירה</button>
</div>
<div id="toast"></div>

<script>
var DATA = {rows:[], programs:[], stages:[], schema:[], templates:[]};
var BYKEY = {};

// נרמול שם-תוכנית בצד הלקוח (תואם canonicalProgram_ בשרת) — כדי לאחד תווית נקייה
// עם שם-לשונית ארוך שעוד לא יובא מחדש.
function canonProg(s){
  var t = String(s||'');
  if (/הדיאלוגי|דיאלוג/.test(t))             return 'הדיאלוגי';
  if (/תעודה|הצמצום|תהוד/.test(t))           return 'תעודה';
  if (/אח["׳']?ד|אחד|תוכנית אח/.test(t))      return 'אח"ד';
  return s;
}
// צבע קבוע לכל תוכנית — מהשרת (PROGRAM_COLORS), עם נפילה-לאחור לפלטה.
var PALETTE = ['#2b6cb0','#dd6b20','#2f855a','#c53030','#6b46c1','#0d9488','#b7791f','#be185d'];
var PROGCOLOR = {};
function buildColors(progs){
  PROGCOLOR = {};
  var server = DATA.programColors || {};
  (progs||[]).forEach(function(p,i){ PROGCOLOR[canonProg(p)] = server[canonProg(p)] || PALETTE[i % PALETTE.length]; });
}
function progColor(p){ return PROGCOLOR[canonProg(p)] || (DATA.programColors||{})[canonProg(p)] || '#9aa7b1'; }
function tplFor(prog){ var cp=canonProg(prog); return (DATA.templates||[]).filter(function(t){return canonProg(t.program)===cp;})[0]; }
// תשלומים: אילו שולמו, והאם ממתין לתשלום (התקבל אך לא שילם דמי הרשמה)
function paidFees(r){ var f=[]; if(r.payInterview)f.push('ראיון'); if(r.payReg)f.push('הרשמה'); if(r.payDeposit)f.push('מקדמה'); if(r.payTuition)f.push('שכ"ל'); return f; }
function awaitingPayment(r){ if(r.recordType==='איש-קשר')return false; if(String(r.stage||'').indexOf('סגור')>=0)return false; return r.interview==='התקבל' && !r.payReg; }

function show(v){
  CURRENT_VIEW = v;
  document.getElementById('view-board').style.display = v==='board'?'':'none';
  document.getElementById('view-table').style.display = v==='table'?'':'none';
  document.getElementById('view-courses').style.display = v==='courses'?'':'none';
  document.getElementById('view-dash').style.display  = v==='dash'?'':'none';
  document.getElementById('view-contacts').style.display = v==='contacts'?'':'none';
  document.getElementById('view-report').style.display = v==='report'?'':'none';
  document.getElementById('bar').style.display = v==='board'?'':'none';
  document.getElementById('tab-board').classList.toggle('active', v==='board');
  document.getElementById('tab-table').classList.toggle('active', v==='table');
  document.getElementById('tab-courses').classList.toggle('active', v==='courses');
  document.getElementById('tab-dash').classList.toggle('active', v==='dash');
  document.getElementById('tab-contacts').classList.toggle('active', v==='contacts');
  document.getElementById('tab-report').classList.toggle('active', v==='report');
  if (v==='table') renderTable();
  if (v==='courses') renderCourses();
  if (v==='dash') loadDash();
  if (v==='contacts') renderContacts();
  if (v==='report') renderReport();
}

function load(){
  google.script.run.withSuccessHandler(function(s){
    var d = JSON.parse(s);
    DATA = d; BYKEY={}; d.schema.forEach(function(c){BYKEY[c.key]=c;});
    // התוכניות הפעילות השנה (3) — מהשרת. נופלים-לאחור לתוכניות שבנתונים אם חסר.
    var progs = (DATA.activePrograms && DATA.activePrograms.length) ? DATA.activePrograms.slice() : [];
    if (!progs.length){
      var seen={}; DATA.rows.forEach(function(r){ var c=canonProg(r.program); if(r.recordType!=='איש-קשר'&&c&&!seen[c]){seen[c]=1;progs.push(c);} });
    }
    buildColors(progs);
    var sel = document.getElementById('progFilter');
    var prev = sel.value;
    sel.innerHTML = '<option value="">כל התוכניות</option>' +
      progs.map(function(p){return '<option'+(p===prev?' selected':'')+'>'+esc(p)+'</option>';}).join('');
    document.getElementById('legend').innerHTML = progs.map(function(p){
      return '<span class="lg"><span class="dot" style="background:'+progColor(p)+'"></span>'+esc(p)+'</span>';
    }).join('');
    updateMoodleAlert();
    render();
  }).withFailureHandler(err).apiBoard();
}

// רשימת השלבים (עמודות) ללוח לפי התוכנית שנבחרה. "כל התוכניות" → השלבים שמופיעים בפועל.
function columnsFor(prog, rows){
  var canon = canonProg(prog);
  var base = (canon && DATA.funnels && DATA.funnels[canon]) ? DATA.funnels[canon].slice() : null;
  var hasClosed = rows.some(function(r){ return String(effStage(r)||'').indexOf('✗')>=0; });
  if (base){
    if (hasClosed) base.push('✗ סגור');
    return base;
  }
  // ללא תוכנית מסוננת: כל השלבים שקיימים ברשומות, ממוינים (קידומת מספרית → סדר טבעי).
  var seen={}, out=[];
  rows.forEach(function(r){ var s=effStage(r); if(s && !seen[s]){ seen[s]=1; out.push(s); } });
  out.sort();
  return out;
}

// המשפך של כל כרטיס — לפי התוכנית, או הגנרי לתוכנית לא-מזוהה (כדי שכל כרטיס יקבל משפך).
function cardFunnel(program){
  var p = canonProg(program);
  return (DATA.funnels && DATA.funnels[p]) || DATA.genericFunnel || [];
}
// שלב אפקטיבי בלוח = מיקום ידני (גרירה) אם תקף למשפך הכרטיס, אחרת השלב המחושב.
function effStage(r){
  var f = cardFunnel(r.program);
  if (r.boardStage && f.indexOf(r.boardStage) >= 0) return r.boardStage;
  return r.stage;
}
function truthy_(v){
  if (v===true || v==='TRUE' || v==='true') return true;
  if (v===false || v==='' || v==null || v==='FALSE' || v==='false') return false;
  if (typeof v==='number') return v>0;
  if (typeof v==='string') return v.trim().length>0;
  return !!v;
}
var DRAG_ID = null;
var CURRENT_VIEW = 'board';

// ימים מאז שהפנייה נכנסה לשלב הנוכחי (stageSince) — להתיישנות.
function agingDays(r){
  var d = r.stageSince || r.inquiryDate; if (!d) return 0;
  var t = new Date(d).getTime(); if (isNaN(t)) return 0;
  return Math.floor((Date.now() - t) / 86400000);
}
function agingClass(r){ var a = agingDays(r); return a>=10 ? 'age2' : (a>=5 ? 'age1' : ''); }
// מספר לוואטסאפ (972...) + קישור
function waNum(ph){ var p=String(ph||'').replace(/\D/g,''); if(!p) return ''; return p.indexOf('972')===0 ? p : p.replace(/^0/,'972'); }
function waLink(ph){ var n=waNum(ph); return n ? 'https://wa.me/'+n : ''; }
// העתקת טקסט ללוח (טלפון) בלי לפתוח כרטיס
function copyPhone(ph){
  var ta=document.createElement('textarea'); ta.value=String(ph||''); ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); toast('הטלפון הועתק: '+ph); }catch(e){ toast('בחר/י והעתק/י ידנית'); }
  document.body.removeChild(ta);
}
/* ===== בחירה מרובה + העתקת טלפונים (05X) לרשימה אחת לוואטסאפ =====
   פעיל בלוח בלבד. עובד על כל חתך שטל סיננה אליו (תוכנית / שלב / תזכורת) —
   לא רק על המתעניינים. "בחר עמודה שלמה" בכותרת → כל הכרטיסים בשלב בקליק אחד. */
var SEL_MODE = false;
var SELECTED = {};
function toggleSelMode(){
  SEL_MODE = !SEL_MODE;
  if (!SEL_MODE) SELECTED = {};
  var b = document.getElementById('selBtn');
  if (b){ b.classList.toggle('on', SEL_MODE); b.textContent = SEL_MODE ? '✔ מצב בחירה פעיל' : '✔ בחירה מרובה'; }
  render();
  updateSelBar();
}
function cssId_(id){ return String(id).replace(/["\\]/g,'\\$&'); }
function toggleSel(id){
  if (SELECTED[id]) delete SELECTED[id]; else SELECTED[id]=1;
  var card = document.querySelector('.card[data-id="'+cssId_(id)+'"]');
  if (card){ card.classList.toggle('sel', !!SELECTED[id]); var cb=card.querySelector('.selchk'); if(cb) cb.checked=!!SELECTED[id]; }
  syncColHeaders(); updateSelBar();
}
function selectCol(colEl, on){
  if (!colEl) return;
  colEl.querySelectorAll('.card[data-id]').forEach(function(c){
    var id=c.getAttribute('data-id');
    if (on) SELECTED[id]=1; else delete SELECTED[id];
    c.classList.toggle('sel', on); var cb=c.querySelector('.selchk'); if(cb) cb.checked=on;
  });
  updateSelBar();
}
function syncColHeaders(){
  document.querySelectorAll('#board .col').forEach(function(col){
    var chk=col.querySelector('.colchk'); if(!chk) return;
    var cards=col.querySelectorAll('.card[data-id]');
    if(!cards.length){ chk.checked=false; chk.indeterminate=false; return; }
    var sel=0; cards.forEach(function(c){ if(SELECTED[c.getAttribute('data-id')]) sel++; });
    chk.checked = sel===cards.length; chk.indeterminate = sel>0 && sel<cards.length;
  });
}
function clearSel(){ SELECTED={}; rerenderCurrent(); updateSelBar(); }
// "סגור בחירה": בלוח — יציאה ממצב-בחירה; בטבלה (אין מצב) — פשוט ניקוי.
function endSelection(){ if (SEL_MODE) toggleSelMode(); else clearSel(); }
function updateSelBar(){
  var n = Object.keys(SELECTED).length;
  var bar = document.getElementById('selbar');
  document.getElementById('selCount').textContent = n;
  bar.classList.toggle('show', n>0);   // מוצג בכל תצוגה (לוח + טבלה רוחבית)
}
/* ===== בחירה מרובה בטבלה הרוחבית — צ'ק-בוקס בכל שורה + "בחר הכל" ===== */
function toggleSelTable(id, on){ if(on) SELECTED[id]=1; else delete SELECTED[id]; updateSelBar(); syncTableHead(); }
function selectAllTable(on){
  document.querySelectorAll('#tableView .rowchk').forEach(function(cb){
    cb.checked=on; var id=cb.getAttribute('data-id');
    if(on) SELECTED[id]=1; else delete SELECTED[id];
  });
  updateSelBar();
}
function syncTableHead(){
  var all=document.getElementById('tblAll'); if(!all) return;
  var boxes=document.querySelectorAll('#tableView .rowchk');
  if(!boxes.length){ all.checked=false; all.indeterminate=false; return; }
  var sel=0; boxes.forEach(function(b){ if(SELECTED[b.getAttribute('data-id')]) sel++; });
  all.checked = sel===boxes.length; all.indeterminate = sel>0 && sel<boxes.length;
}
// נרמול לפורמט ישראלי מקומי 05X (מסיר קידומת 972 / מוסיף 0 חסר).
function phone05_(ph){
  var p = String(ph||'').replace(/\D/g,'');
  if (!p) return '';
  if (p.indexOf('972')===0) p = '0'+p.slice(3);
  else if (p.charAt(0)!=='0' && p.length>=9) p = '0'+p;
  return p;
}
function copySelectedPhones(){
  var nums=[], noPhone=0, seen={};
  Object.keys(SELECTED).forEach(function(id){
    var r=rowById(id); if(!r) return;
    var p=phone05_(r.phone); if(!p){ noPhone++; return; }
    if(seen[p]) return; seen[p]=1; nums.push(p);
  });
  if(!nums.length){ toast('אין טלפונים בבחירה'); return; }
  var txt=nums.join('\n');
  var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); toast('הועתקו '+nums.length+' טלפונים'+(noPhone?(' · '+noPhone+' ללא טלפון דולגו'):'')+' — הדבק/י בוואטסאפ'); }
  catch(e){ toast('בחר/י והעתק/י ידנית'); }
  document.body.removeChild(ta);
}

// עדכון אופטימי: מחליף רשומה מקומית (מתשובת השרת) ומרענן את התצוגה הנוכחית — בלי טעינה מלאה.
function patchLocal(updatedJson){
  try{
    var u = JSON.parse(updatedJson);
    var i = DATA.rows.findIndex(function(r){ return r.id===u.id; });
    if (i>=0) DATA.rows[i] = u; else DATA.rows.push(u);
  }catch(e){}
  updateMoodleAlert();
  rerenderCurrent();
}
function removeLocal(id){ DATA.rows = DATA.rows.filter(function(r){ return r.id!==id; }); updateMoodleAlert(); rerenderCurrent(); }
function rerenderCurrent(){
  if (CURRENT_VIEW==='board') render();
  else if (CURRENT_VIEW==='table') renderTable();
  else if (CURRENT_VIEW==='courses') renderCourses();
  else if (CURRENT_VIEW==='contacts') renderContacts();
  else if (CURRENT_VIEW==='report') renderReport();
}

function render(){
  var prog = document.getElementById('progFilter').value;
  var remOnly = document.getElementById('remOnly').checked;
  var payOnly = document.getElementById('payOnly').checked;
  var q = document.getElementById('search').value.trim();
  var effProg = q ? '' : prog;   // בחיפוש — סורקים את כל התוכניות (מדגיש, לא מסנן)
  var rows = DATA.rows.filter(function(r){
    if (r.recordType!=='פנייה') return false;   // אנשי קשר / קורסים — בלשוניות נפרדות
    if (effProg && canonProg(r.program)!==effProg) return false;
    if (remOnly && !r.reminder) return false;
    if (payOnly && !awaitingPayment(r)) return false;
    return true;
  });
  function isHit(r){ return q && (String(r.name).indexOf(q)>=0 || String(r.phone).indexOf(q)>=0); }
  var firstHit = null;
  var board = document.getElementById('board');
  var keepScroll = board.scrollLeft;   // שמירת מיקום גלילה אופקי (לא לאבד מקום)
  board.innerHTML = '';

  // בניית כרטיס בודד — משותף לתצוגה הרגילה ולתת-קבוצות-הגיל.
  function makeCard(r){
    var c = document.createElement('div');
    var ageC = agingClass(r);
    var hit = isHit(r);
    var isSel = !!SELECTED[r.id];
    c.className = 'card' + (r.reminder?' rem':'') + (ageC?(' '+ageC):'') + (hit?' hit':'') + (isSel?' sel':'');
    c.setAttribute('data-id', r.id);
    if (hit && !firstHit) firstHit = c;
    c.style.borderLeftColor = progColor(r.program||'');
    if (SEL_MODE){
      // מצב בחירה: לחיצה על הכרטיס מסמנת/מבטלת (הגרירה מושבתת).
      c.onclick = function(ev){ if(ev.target.tagName==='A') return; toggleSel(r.id); };
    } else {
      c.draggable = true;
      c.addEventListener('dragstart', function(ev){ DRAG_ID = r.id; c.classList.add('dragging'); if(ev.dataTransfer) ev.dataTransfer.effectAllowed='move'; });
      c.addEventListener('dragend', function(){ c.classList.remove('dragging'); });
      c.onclick = function(){ openEdit(r.id); };
    }
    var fees = paidFees(r);
    var payPill = fees.length ? '<span class="pill pay">💳 '+esc(fees.join('+'))+'</span>'
      : (awaitingPayment(r) ? '<span class="pill wait">💳 ממתין לתשלום</span>' : '');
    var gate = r.gateWarn ? '<span class="pill gate" title="'+esc(r.gateWarn)+'">⚠ חסר לריאיון</span>' : '';
    var aged = agingDays(r);
    var ageTag = ageC ? '<span class="pill" style="background:'+(ageC==='age2'?'#fde2e2;color:#9b2c2c':'#fff0e0;color:#9a5800')+'">🕓 '+aged+' ימ\' בשלב</span>' : '';
    var noProgTag = !String(r.program||'').trim() ? '<span class="pill" style="background:#fde2e2;color:#9b2c2c">⚠ ללא תוכנית</span>' : '';
    var contact = r.phone ? ' · '+esc(r.phone)+
      ' <a class="ic-btn" href="'+waLink(r.phone)+'" target="_blank" onclick="event.stopPropagation()" title="וואטסאפ">💬</a>'+
      ' <span class="ic-btn" onclick="event.stopPropagation();copyPhone(\''+esc(r.phone)+'\')" title="העתק טלפון">📋</span>' : '';
    var selBox = SEL_MODE ? '<input type="checkbox" class="selchk"'+(isSel?' checked':'')+' onclick="event.stopPropagation();toggleSel(\''+esc(r.id)+'\')">' : '';
    c.innerHTML = selBox+
      '<div class="nm">'+esc(r.name||'(ללא שם)')+'</div>'+
      '<div class="meta"><span class="dot" style="background:'+progColor(r.program||'')+'"></span>'+esc(canonProg(r.program)||'')+contact+'</div>'+
      '<span class="pill'+(r.reminder?' rem':'')+'">'+esc(r.nextAction||'')+'</span>'+payPill+gate+ageTag+noProgTag;
    return c;
  }

  // תת-קבוצות גיל בעמודת המתעניינים (שלבים 0/1) — לפי זמן כניסה לשלב (stageSince).
  // מסודר מהוותיק לטרי, כדי שהמתקררים (שדורשים חזרה) יופיעו למעלה.
  var AGE_BUCKETS = [
    {lbl:'🔴 מעל חודש',      test:function(a){ return a>30; }},
    {lbl:'🟠 2–4 שבועות',    test:function(a){ return a>=15 && a<=30; }},
    {lbl:'🟡 שבוע–שבועיים',  test:function(a){ return a>=8 && a<=14; }},
    {lbl:'🟢 השבוע',         test:function(a){ return a<8; }}
  ];
  // שלב "התעניינות" = שלב מוקדם (0/1) שאינו כבר נרשם/התקבל (מחריג את אח"ד '1 · נרשם').
  function isInterestStage(stage){ var s=String(stage); return /^[01]\s*·/.test(s) && !/נרשם|התקבל/.test(s); }

  columnsFor(effProg, rows).forEach(function(stage){
    var inStage = rows.filter(function(r){ return effStage(r)===stage; });
    inStage.sort(function(a,b){ return agingDays(b)-agingDays(a); });   // התקועות (מאוחרות) למעלה
    var col = document.createElement('div'); col.className='col'; col.setAttribute('data-stage', stage);
    var colChk = SEL_MODE ? '<input type="checkbox" class="colchk" title="בחר/בטל את כל העמודה" onclick="selectCol(this.closest(\'.col\'), this.checked)"> ' : '';
    col.innerHTML = '<h3>'+colChk+esc(stage)+' <span class="n">('+inStage.length+')</span></h3>';
    var cards = document.createElement('div'); cards.className='cards';
    // עמודה = יעד-גרירה (מושבת במצב בחירה)
    if (!SEL_MODE){
      cards.addEventListener('dragover', function(ev){ ev.preventDefault(); col.classList.add('drop-hover'); });
      cards.addEventListener('dragleave', function(){ col.classList.remove('drop-hover'); });
      cards.addEventListener('drop', function(ev){ ev.preventDefault(); col.classList.remove('drop-hover'); onDrop(stage); });
    }
    if (isInterestStage(stage) && inStage.length){
      // פילוח לפי זמן כניסה — תת-כותרות בתוך העמודה.
      AGE_BUCKETS.forEach(function(bk){
        var grp = inStage.filter(function(r){ return bk.test(agingDays(r)); });
        if (!grp.length) return;
        var h = document.createElement('div'); h.className='agehdr';
        h.textContent = bk.lbl+' ('+grp.length+')';
        cards.appendChild(h);
        grp.forEach(function(r){ cards.appendChild(makeCard(r)); });
      });
    } else {
      inStage.forEach(function(r){ cards.appendChild(makeCard(r)); });
    }
    if (!inStage.length){ var e=document.createElement('div'); e.className='empty'; e.style.cssText='padding:14px;font-size:12px'; e.textContent='—'; cards.appendChild(e); }
    col.appendChild(cards); board.appendChild(col);
  });
  syncColHeaders();
  if (firstHit) setTimeout(function(){ firstHit.scrollIntoView({behavior:'smooth', block:'center', inline:'center'}); }, 20);
  else board.scrollLeft = keepScroll;
}

// מעבר לשלב (גרירה / שינוי בכרטיס): אזהרת-מעבר אם חסרות אבני-דרך, ואז סימון אבן-הדרך
// של השלב (אם מוגדרת) — כך הגרירה מעדכנת את הנתונים בפועל. מחזיר true אם ממשיכים.
function applyStageMove(r, stage){
  // (1) אין תוכנית → אי-אפשר לשבץ בשלב.
  if (!String(r.program||'').trim()){
    alert('לפנייה של "'+(r.name||'')+'" אין עדיין תוכנית, אז אי-אפשר לשבץ אותה בשלב.\nפתח/י את הכרטיס, בחר/י תוכנית, ואז אפשר להזיז בין השלבים.');
    return false;
  }
  var prog = canonProg(r.program);
  // (2) סגירה — דרך הסטטוס, לא דרך גרירה.
  if (String(stage).indexOf('✗')>=0){
    alert('לסגירת פנייה — פתח/י את הכרטיס ועדכן/י את "סטטוס" (נדחה / לא מעוניין).');
    return false;
  }
  // (3) השלב חייב להיות במשפך של הכרטיס (כולל תוכנית לא-מזוהה → משפך גנרי).
  var f = cardFunnel(r.program);
  if (f.length && f.indexOf(stage) < 0){
    alert('השלב "'+stage+'" אינו שייך למשפך של "'+(r.name||'')+'".\nאפשר להזיז אותה רק בין שלבי המשפך שלה (כדאי לסנן לפי התוכנית בסרגל למעלה).');
    return false;
  }
  var curIdx = f.indexOf(effStage(r)), tgtIdx = f.indexOf(stage);
  // (4) אזהרת-שער רכה — רק במעבר קדימה (אבני-דרך מומלצות), ניתנת לדילוג.
  if (tgtIdx > curIdx){
    var reqs = (DATA.stageRequires && DATA.stageRequires[prog] && DATA.stageRequires[prog][stage]) || [];
    var missing = reqs.filter(function(qq){ return !truthy_(r[qq.key]); });
    if (missing.length){
      if (!confirm('לפני "'+stage+'" כדאי לוודא:\n• '+missing.map(function(m){return m.label;}).join('\n• ')+'\n\nלהמשיך בכל זאת?')) return false;
    }
  }
  // (5) תמיד נועלים את המיקום ליעד (boardStage=stage) כדי שהכרטיס יישאר בעמודה שאליה נגרר —
  //     גם אם אבן-הדרך לבדה גוזרת שלב נמוך יותר (מונע "קפיצה חזרה"). במעבר קדימה גם מסמנים
  //     את אבן-הדרך של השלב (אם מוגדרת) כדי שהגרירה תעדכן נתונים, לא רק מיקום.
  var apply = (tgtIdx > curIdx) && DATA.stageApply && DATA.stageApply[prog] && DATA.stageApply[prog][stage];
  var patch = {id:r.id, boardStage:stage}, setMsg = '';
  if (apply){ for (var k in apply){ patch[k]=apply[k]; } setMsg = ' · סומן: '+stageApplyLabel(apply); }
  toast('מעדכן…');
  google.script.run.withSuccessHandler(function(s){ patchLocal(s); toast('הועבר ל'+stage+setMsg); }).withFailureHandler(err).apiUpdate(patch);
  return true;
}
function stageApplyLabel(a){
  if (a.interview==='נקבע') return 'ריאיון נקבע';
  if (a.interview==='התקבל') return 'התקבל';
  if (a.payDeposit) return 'מקדמה שולמה';
  if (a.payReg) return 'דמי הרשמה שולמו';
  if (a.spoke) return 'שוחחנו';
  return 'עודכן';
}

// שינוי שלב מתוך הכרטיס.
function onCardStageChange(id, stage){
  var r = rowById(id); if (!r) return;
  if (applyStageMove(r, stage)) closeOv();
  else { closeOv(); openEdit(id); }   // בוטל → להחזיר את הכרטיס
}

// גרירה הסתיימה על עמודה.
function onDrop(stage){
  var id = DRAG_ID; DRAG_ID = null;
  if (!id) return;
  var r = rowById(id);
  if (!r || effStage(r)===stage) return;
  if (!applyStageMove(r, stage)) render();   // בוטל → רענון מקומי
}

function rowById(id){ return DATA.rows.filter(function(r){return r.id===id;})[0]; }

function openEdit(id){ buildModal(rowById(id), false); }
function openNew(){ buildModal({status:'פנייה חדשה'}, true); }

function buildModal(rec, isNew){
  // צמצום הכרטיס לפי תוכנית (למשל תעודה — כרטיס קליל). שדה/קבוצה מוסתרים אינם נרנדרים
  // ואינם נאספים ב-collect(), כך שערכם הקיים נשמר ואינו נמחק.
  var hide = (DATA.programCardHide && DATA.programCardHide[canonProg(rec.program)]) || {groups:[], keys:[]};
  var hideG = hide.groups || [], hideK = hide.keys || [];
  var groups = {};
  DATA.schema.forEach(function(c){
    if (c.key==='id'||c.group==='מטא'||(c.computed&&isNew)) return;
    if (hideG.indexOf(c.group)>=0 || hideK.indexOf(c.key)>=0) return;
    (groups[c.group]=groups[c.group]||[]).push(c);
  });
  var html = '<div class="mh"><h2>'+(isNew?'פנייה חדשה':esc(rec.name||'פנייה'))+'</h2>'+
    (rec.stage?'<span class="pill" style="background:#ffffff22;color:#fff">'+esc(rec.stage)+'</span>':'')+
    '<span class="x" onclick="closeOv()">×</span></div><div class="mb">';
  // אזהרת שער (רכה) — בהדיאלוגי, ריאיון מחייב דמי הרשמה תחילה. לא חוסם.
  if (rec.gateWarn){
    html += '<div style="background:#fde2e2;color:#9b2c2c;border:1px solid #f5b5b5;border-radius:8px;padding:9px 11px;margin-bottom:12px;font-size:12.5px">⚠ '+esc(rec.gateWarn)+'</div>';
  }
  // בקרת שלב בכרטיס — כמו גרירה: אפשר לשנות ידנית, עם אזהרה אם דילגת על שלב.
  if (!isNew && rec.recordType==='פנייה'){
    var sf = DATA.funnels && DATA.funnels[canonProg(rec.program)];
    if (sf){
      var curStage = (rec.boardStage && sf.indexOf(rec.boardStage)>=0) ? rec.boardStage : rec.stage;
      var opts = sf.slice(); if (String(rec.stage||'').indexOf('✗')>=0 && opts.indexOf('✗ סגור')<0) opts.push('✗ סגור');
      html += '<div class="grp"><h4>שלב במשפך</h4>'+
        '<select id="cardStage" onchange="onCardStageChange(\''+rec.id+'\', this.value)">'+
        opts.map(function(s){return '<option'+(s===curStage?' selected':'')+'>'+esc(s)+'</option>';}).join('')+
        '</select>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:3px">שינוי ידני יזיז את הכרטיס (עם אזהרה אם דילגת). סימון עובדה בכרטיס יחזיר לחישוב האוטומטי.</div></div>';
    }
  }
  Object.keys(groups).forEach(function(g){
    html += '<div class="grp"><h4>'+esc(g)+'</h4><div class="fields">';
    groups[g].forEach(function(c){
      var v = rec[c.key]; v = (v===undefined||v===null)?'':v;
      var full = (c.type==='string'&&['recommend','missingForms','noInterest','crmNote','payNote','delibEarly','delibLate'].indexOf(c.key)>=0)?' full':'';
      var dis = c.computed?' disabled':'';
      var lbl = esc(c.label||c.header);
      if (c.key==='program'){
        // בחירה מתוך שלוש התוכניות הפעילות (במקום הקלדת השם הארוך) — כך הצבע/המקרא תמיד תואמים.
        var cur = canonProg(v);
        var progs = (DATA.activePrograms||[]).slice();
        if (cur && progs.indexOf(cur)<0) progs.unshift(cur);   // לשמר תוכנית שאינה ברשימה הפעילה
        html += '<div class="f full"><label>'+lbl+'</label>'+
          '<select id="fld_program" onchange="onProgChange(this)">'+
            '<option value=""'+(cur===''?' selected':'')+'>— בחר תוכנית —</option>'+
            progs.map(function(p){return '<option'+(p===cur?' selected':'')+'>'+esc(p)+'</option>';}).join('')+
            '<option value="__new__">➕ תוכנית חדשה…</option>'+
          '</select>'+
          '<input type="text" id="fld_program_new" placeholder="שם תוכנית חדשה" style="display:none;margin-top:6px">'+
        '</div>';
        return;
      }
      if (c.type==='bool'){
        // ✓ עם תאריך צמוד → סימון ממלא את התאריך של היום (רק אם ריק). ניתן לשינוי ידני אחר-כך.
        var pairKey = (DATA.autoDatePairs||{})[c.key];
        var onCh = pairKey ? ' onchange="autoFillDate(\''+c.key+'\',\''+pairKey+'\')"' : '';
        html += '<div class="f chk"><input type="checkbox" id="fld_'+c.key+'"'+(v===true||v==='TRUE'?' checked':'')+dis+onCh+'><label for="fld_'+c.key+'">'+lbl+'</label></div>';
      } else if (c.options){
        html += '<div class="f'+full+'"><label>'+lbl+'</label><select id="fld_'+c.key+'"'+dis+'>'+
          c.options.map(function(o){return '<option'+(o===v?' selected':'')+'>'+esc(o)+'</option>';}).join('')+'</select></div>';
      } else if (full){
        html += '<div class="f full"><label>'+lbl+'</label><textarea id="fld_'+c.key+'" rows="2"'+dis+'>'+esc(v)+'</textarea></div>';
      } else {
        var t = c.type==='date'?'date':(c.type==='number'?'number':'text');
        html += '<div class="f"><label>'+lbl+'</label><input type="'+t+'" id="fld_'+c.key+'" value="'+esc(v)+'"'+dis+'></div>';
      }
    });
    html += '</div></div>';
  });
  // תבנית הודעה לפי התוכנית של הפנייה
  var tpl = tplFor(rec.program);
  if (tpl && tpl.body){
    var filled = tpl.body.replace(/\{\{שם\}\}/g, rec.name||'');
    html += '<div class="grp"><h4>תבנית הודעה — '+esc(canonProg(rec.program)||'')+'</h4>'+
      '<textarea id="tplBody" rows="6" style="width:100%" readonly>'+esc(filled)+'</textarea>'+
      '<button type="button" class="btn" style="margin-top:6px" onclick="copyTpl()">📋 העתק טקסט</button></div>';
  }
  html += '</div><div class="mf"><button class="btn" onclick="save(\''+(isNew?'':rec.id)+'\','+isNew+')">שמירה</button>';
  if (!isNew && rec.email) html += '<button class="btn" style="background:var(--slate);border-color:var(--slate)" onclick="sendMaterial(\''+rec.id+'\')">✉ שלח חומר</button>';
  if (!isNew && rec.recordType==='פנייה') html += '<button class="tabs" style="background:#fff3df;color:#9a5800;border:1px solid #f0c890;border-radius:7px;padding:7px 13px;cursor:pointer" onclick="resetAging(\''+rec.id+'\')" title="מאפס את מונה ההמתנה בשלב הנוכחי">🕓 אפס המתנה</button>';
  html += '<button class="tabs" style="background:#eee;color:#333;border:1px solid #ccc;border-radius:7px;padding:7px 13px;cursor:pointer" onclick="closeOv()">ביטול</button>';
  if (!isNew) html += '<button class="tabs" style="margin-right:auto;background:#fff0f0;color:#c0392b;border:1px solid #f0b8b8;border-radius:7px;padding:7px 13px;cursor:pointer" onclick="delInquiry(\''+rec.id+'\',\''+esc(rec.name||'')+'\')">🗑 מחק פנייה</button>';
  html += '</div>';
  document.getElementById('modal').innerHTML = html;
  document.getElementById('ov').classList.add('show');
}

function delInquiry(id, name){
  if (!confirm('למחוק את הפנייה של "'+(name||'')+'"? פעולה זו אינה ניתנת לביטול.')) return;
  toast('מוחק…');
  google.script.run.withSuccessHandler(function(){ closeOv(); toast('נמחק'); removeLocal(id); }).withFailureHandler(err).apiDelete(id);
}
function resetAging(id){
  toast('מאפס…');
  var t=new Date(), d=t.getFullYear()+'-'+('0'+(t.getMonth()+1)).slice(-2)+'-'+('0'+t.getDate()).slice(-2);
  google.script.run.withSuccessHandler(function(s){ toast('מונה ההמתנה אופס'); patchLocal(s); }).withFailureHandler(err).apiUpdate({id:id, stageSince:d});
}

// סימון ✓ → מילוי אוטומטי של התאריך הצמוד בתאריך היום (בקשת טל).
// ממלא רק אם התאריך ריק — תאריך שהוזן ידנית לא נדרס, וניתן לערוך את השדה תמיד.
// ביטול הסימון לא מוחק את התאריך (כדי לא לאבד נתון בטעות).
function autoFillDate(boolKey, dateKey){
  var cb = document.getElementById('fld_'+boolKey);
  var df = document.getElementById('fld_'+dateKey);
  if (!cb || !df) return;           // השדה מוסתר בתוכנית הזו — השרת ימלא בכל מקרה
  if (cb.checked && !df.value){
    var t = new Date();
    df.value = t.getFullYear()+'-'+('0'+(t.getMonth()+1)).slice(-2)+'-'+('0'+t.getDate()).slice(-2);
    df.style.background = '#eafaf8';   // רמז ויזואלי: מולא אוטומטית, אפשר לשנות
    toast('התאריך מולא אוטומטית — אפשר לשנות');
  }
}

// הצגת תיבת "תוכנית חדשה" כשנבחר ➕
function onProgChange(sel){
  var ne = document.getElementById('fld_program_new');
  if (!ne) return;
  var isNew = sel.value==='__new__';
  ne.style.display = isNew?'':'none';
  if (isNew) ne.focus();
}

function collect(isNew){
  var patch = {};
  DATA.schema.forEach(function(c){
    if (c.group==='מטא'||c.computed||c.key==='id') return;
    if (c.key==='program'){
      var se = document.getElementById('fld_program'); if (!se) return;
      var pv = se.value;
      if (pv==='__new__'){ var ne = document.getElementById('fld_program_new'); pv = ne?ne.value.trim():''; }
      patch.program = pv; return;
    }
    var el = document.getElementById('fld_'+c.key); if (!el) return;
    patch[c.key] = (c.type==='bool') ? el.checked : el.value;
  });
  return patch;
}

function save(id, isNew){
  var patch = collect(isNew);
  if (isNew){
    if (!String(patch.name||'').trim()){ toast('יש להזין שם'); return; }
    if ((patch.recordType||'פנייה')==='פנייה' && !String(patch.program||'').trim()){ toast('יש לבחור תוכנית'); return; }
    // תזכורת רכה (לא חוסמת): לעיתים פונים ממיכל ללא כל הפרטים.
    if (!String(patch.phone||'').trim() && !String(patch.email||'').trim()){
      if (!confirm('לא הוזן טלפון או מייל — לשמור בכל זאת?')) return;
    }
  }
  toast('שומר…');
  if (isNew){
    google.script.run.withSuccessHandler(function(s){ closeOv(); toast('נוצרה פנייה'); patchLocal(s); }).withFailureHandler(err).apiCreate(patch);
  } else {
    patch.id = id;
    google.script.run.withSuccessHandler(function(s){ closeOv(); toast('נשמר'); patchLocal(s); }).withFailureHandler(err).apiUpdate(patch);
  }
}

function sendMaterial(id){
  if (!confirm('לשלוח את מייל החומר לפונה?')) return;
  toast('שולח…');
  google.script.run.withSuccessHandler(function(s){ var r=JSON.parse(s); toast('נשלח ל-'+r.to); closeOv(); load(); }).withFailureHandler(err).apiSendMaterial(id);
}

function doImport(){
  toast('מייבא מהקובץ החי…');
  google.script.run.withSuccessHandler(function(s){ var r=JSON.parse(s); toast(r.message); load(); }).withFailureHandler(err).apiImport();
}

function loadDash(){
  document.getElementById('dash').innerHTML = '<div class="spin">טוען…</div>';
  google.script.run.withSuccessHandler(function(s){ renderDash(JSON.parse(s)); }).withFailureHandler(err).apiDashboard();
}
function renderDash(d){
  var html = '';
  Object.keys(d.byProgram).forEach(function(p){
    var counts = d.byProgram[p];
    var stages = (DATA.funnels && DATA.funnels[canonProg(p)]) ? DATA.funnels[canonProg(p)] : d.stages;
    var max = Math.max.apply(null, stages.map(function(s){return counts[s]||0;}).concat([1]));
    html += '<div class="panel"><h2>'+esc(canonProg(p))+'</h2><table class="funnel">';
    stages.forEach(function(s){
      var n = counts[s]||0;
      html += '<tr><td>'+esc(s)+'</td><td style="width:55%"><span class="barfill" style="width:'+(n/max*100)+'%"></span> '+n+'</td></tr>';
    });
    html += '</table></div>';
  });
  html += '<div class="panel"><h2>צריך תזכורת ('+d.reminders.length+')</h2><table><tr><th>שם</th><th>תוכנית</th><th>שלב</th><th>ימים</th></tr>'+
    d.reminders.map(function(r){return '<tr><td><a href="#" onclick="openEdit(\''+r.id+'\');return false">'+esc(r.name)+'</a></td><td>'+esc(r.program)+'</td><td>'+esc(r.stage)+'</td><td>'+r.days+'</td></tr>';}).join('')+'</table></div>';
  html += '<div class="panel"><h2>תשלומים פתוחים ('+d.outstanding.length+')</h2><table><tr><th>שם</th><th>תוכנית</th><th>חוב</th></tr>'+
    d.outstanding.map(function(r){return '<tr><td><a href="#" onclick="openEdit(\''+r.id+'\');return false">'+esc(r.name)+'</a></td><td>'+esc(r.program)+'</td><td>'+esc(r.owe)+'</td></tr>';}).join('')+'</table></div>';
  document.getElementById('dash').innerHTML = html;
}

function renderContacts(){
  var list = DATA.rows.filter(function(r){ return r.recordType==='איש-קשר'; });
  var html = '<div class="panel"><h2>אנשי קשר ('+list.length+')</h2><table>'+
    '<tr><th>שם</th><th>טלפון</th><th>מייל</th><th>עיסוק</th><th>אזור</th><th>תוכנית/רשימה</th></tr>'+
    list.map(function(r){
      return '<tr><td><a href="#" onclick="openEdit(\''+r.id+'\');return false">'+esc(r.name)+'</a></td>'+
        '<td>'+esc(r.phone)+'</td><td>'+esc(r.email)+'</td><td>'+esc(r.occupation)+'</td>'+
        '<td>'+esc(r.city)+'</td><td>'+esc(r.program)+'</td></tr>';
    }).join('')+'</table></div>';
  document.getElementById('contacts').innerHTML = list.length ? html : '<div class="empty">אין אנשי קשר</div>';
}

/* ===== מבט רוחבי — טבלת-על שמחליפה את האקסל ===== */
function docCount(r){
  var req=['docCert','docExperience','docCV','docStory','docRec1','docRec2'];
  var n=req.filter(function(k){return r[k]===true||r[k]==='TRUE';}).length;
  return {n:n,total:req.length,pass:(r.docPassport===true||r.docPassport==='TRUE')};
}
function _td(cls,txt){ return '<td'+(cls?' class="'+cls+'"':'')+'>'+esc(txt)+'</td>'; }
function _boolTd(b,yes,no){ return b?_td('cell-ok',yes||'✓'):_td('cell-pend',no||'—'); }

function renderTable(){
  var host=document.getElementById('tableView');
  var all=DATA.rows.filter(function(r){return r.recordType==='פנייה';});
  var tProg=window._tblProg||'', tNeed=!!window._tblNeed;
  var progs=(DATA.activePrograms||[]);
  var rows=all.filter(function(r){
    if(tProg && canonProg(r.program)!==tProg) return false;
    if(tNeed && !(r.reminder||r.gateWarn||awaitingPayment(r))) return false;
    return true;
  });
  rows.sort(function(a,b){ return String(canonProg(a.program)).localeCompare(String(canonProg(b.program))) || String(a.stage).localeCompare(String(b.stage)) || String(a.name).localeCompare(String(b.name)); });

  var bar='<div class="tbl-bar"><label>תוכנית:</label><select onchange="window._tblProg=this.value;renderTable()">'+
    '<option value=""'+(tProg===''?' selected':'')+'>כל התוכניות</option>'+
    progs.map(function(p){return '<option'+(p===tProg?' selected':'')+'>'+esc(p)+'</option>';}).join('')+'</select>'+
    '<label style="margin-right:8px"><input type="checkbox"'+(tNeed?' checked':'')+' onchange="window._tblNeed=this.checked;renderTable()"> צריך טיפול בלבד</label>'+
    '<span style="color:var(--muted);font-size:12px;margin-right:8px">✔ סמני שורות → "📋 העתק טלפונים" בפס התחתון</span>'+
    '<span style="color:var(--muted);margin-right:auto">'+rows.length+' פניות</span></div>';

  if(!rows.length){ host.innerHTML='<div class="tbl-wrap">'+bar+'<div class="empty">אין פניות להצגה</div></div>'; return; }

  var head='<tr><th style="width:26px"><input type="checkbox" id="tblAll" onclick="selectAllTable(this.checked)" title="בחר/בטל את כל השורות"></th>'+
    '<th>שם</th><th>תוכנית</th><th>טלפון</th><th>שלב</th><th>פעולה הבאה</th><th>קשר</th><th>מסמכים</th>'+
    '<th>דמי הרשמה</th><th>ריאיון</th><th>התקבל</th><th>נרשם</th><th>ימים</th><th>תזכורת</th></tr>';

  var body=rows.map(function(r){
    var dc=docCount(r);
    var docCls=dc.n>=dc.total?'cell-ok':(dc.n>0?'cell-pend':'');
    var docTxt=dc.n+'/'+dc.total+(dc.pass?' +פ':'');
    var iv=String(r.interview||'');
    var ivCls=iv==='התקבל'?'cell-ok':(iv==='נדחה'?'cell-no':(iv&&iv!=='לא נקבע'?'cell-pend':''));
    var dot='<span class="dot" style="background:'+progColor(r.program)+'"></span>';
    return '<tr class="'+(r.gateWarn?'gate-row':'')+'" onclick="openEdit(\''+r.id+'\')" style="cursor:pointer">'+
      '<td onclick="event.stopPropagation()"><input type="checkbox" class="rowchk" data-id="'+esc(r.id)+'"'+(SELECTED[r.id]?' checked':'')+' onchange="toggleSelTable(this.getAttribute(\'data-id\'), this.checked)"></td>'+
      _td('nm',(r.name||'(ללא שם)'))+
      '<td>'+dot+esc(canonProg(r.program))+'</td>'+
      '<td onclick="event.stopPropagation()" style="white-space:nowrap">'+(r.phone?esc(r.phone)+' <a class="ic-btn" href="'+waLink(r.phone)+'" target="_blank" title="וואטסאפ">💬</a> <span class="ic-btn" onclick="copyPhone(\''+esc(r.phone)+'\')" title="העתק">📋</span>':'—')+'</td>'+
      _td('',effStage(r)||'')+
      _td('',r.nextAction||'')+
      _boolTd(r.materialSent||r.spoke,'✓','—')+
      _td(docCls,docTxt)+
      _boolTd(r.payReg,'✓ שולם', r.gateWarn?'⚠ חסר':'—')+
      _td(ivCls,iv||'—')+
      _boolTd(r.interview==='התקבל','✓','—')+
      _boolTd(r.registered,'✓','—')+
      _td(r.daysSince>=14?'cell-pend':'',(r.daysSince===''||r.daysSince==null)?'—':r.daysSince)+
      _td('',r.reminder?('🔔 '+(r.daysSince||'')):'')+
    '</tr>';
  }).join('');

  host.innerHTML='<div class="tbl-wrap">'+bar+'<table class="cross"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
  syncTableHead();
}

/* ===== קורסים — רישום עצמאי + התראת "להכניס למודל" ===== */
function renderCourses(){
  var list = DATA.rows.filter(function(r){ return r.recordType==='קורס'; });
  list.sort(function(a,b){ return (truthy_(b.needsMoodle)?1:0)-(truthy_(a.needsMoodle)?1:0); });
  var pending = list.filter(function(r){ return truthy_(r.needsMoodle); }).length;
  var rowsHtml = list.map(function(r){
    var moodle = truthy_(r.needsMoodle)
      ? '<button class="btn" style="padding:4px 9px;font-size:12px" onclick="markMoodle(\''+r.id+'\')">✓ הוכנס למודל</button>'
      : '<span class="cell-ok" style="padding:2px 8px;border-radius:6px">✓ במודל</span>';
    return '<tr'+(truthy_(r.needsMoodle)?' style="background:#fff7ec"':'')+'>'+
      '<td class="nm"><a href="#" onclick="openEdit(\''+r.id+'\');return false">'+esc(r.name||'(ללא שם)')+'</a></td>'+
      '<td>'+esc(r.program||'')+'</td><td>'+esc(r.phone||'')+'</td><td>'+esc(r.email||'')+'</td>'+
      '<td>'+esc(r.payNote||'')+'</td><td>'+moodle+'</td></tr>';
  }).join('');
  var html = '<div class="panel"><h2>רישומי קורסים ('+list.length+')'+(pending?' · <span style="color:#9a4f00">📌 '+pending+' להכניס למודל</span>':'')+'</h2>'+
    '<table><tr><th>שם</th><th>קורס</th><th>טלפון</th><th>מייל</th><th>תשלום</th><th>למודל</th></tr>'+rowsHtml+'</table></div>';
  document.getElementById('courses').innerHTML = list.length ? html : '<div class="empty">אין רישומי קורסים</div>';
}
function markMoodle(id){
  toast('מעדכן…');
  google.script.run.withSuccessHandler(function(s){ toast('סומן: הוכנס למודל'); patchLocal(s); }).withFailureHandler(err).apiUpdate({id:id, needsMoodle:false});
}
function updateMoodleAlert(){
  var n = DATA.rows.filter(function(r){ return r.recordType==='קורס' && truthy_(r.needsMoodle); }).length;
  var el = document.getElementById('moodleAlert');
  document.getElementById('moodleCount').textContent = n;
  el.style.display = n ? '' : 'none';
}

/* ===== דוח פניות לאורך זמן (משני) — ספירות בלבד, ללא נתונים אישיים ===== */
function renderReport(){
  var host = document.getElementById('reportView');
  var days = (window._repDays===undefined) ? 30 : window._repDays;
  var prog = window._repProg || '', chan = window._repChan || '';
  var progs = DATA.activePrograms || [];
  var chC = (DATA.schema||[]).filter(function(x){return x.key==='channel';})[0];
  var channels = (chC && chC.options) || [];
  var cutStr = '';
  if (days){ var cut = new Date(Date.now() - days*86400000); cutStr = cut.toISOString().slice(0,10); }
  var rows = DATA.rows.filter(function(r){
    if (r.recordType!=='פנייה' || !r.inquiryDate) return false;
    if (prog && canonProg(r.program)!==prog) return false;
    if (chan && r.channel!==chan) return false;
    if (cutStr && String(r.inquiryDate) < cutStr) return false;
    return true;
  });
  var byDay={}, byChan={};
  rows.forEach(function(r){
    byDay[r.inquiryDate]=(byDay[r.inquiryDate]||0)+1;
    // רק ערוצים חוקיים; כל ערך אחר (ריק / ערך-זבל שדלף מהייבוא הישן) → "(לא ידוע)"
    var c = (channels.indexOf(r.channel) >= 0) ? r.channel : '(לא ידוע)';
    byChan[c]=(byChan[c]||0)+1;
  });
  var dates = Object.keys(byDay).sort().reverse();
  var max = Math.max.apply(null, dates.map(function(d){return byDay[d];}).concat([1]));
  var bar = '<div class="tbl-bar">'+
    '<label>טווח:</label><select onchange="window._repDays=this.value?+this.value:0;renderReport()">'+
      [['30','30 יום'],['60','60 יום'],['90','90 יום'],['0','הכל']].map(function(o){return '<option value="'+o[0]+'"'+((''+days)===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+'</select>'+
    '<label style="margin-right:8px">תוכנית:</label><select onchange="window._repProg=this.value;renderReport()"><option value="">הכל</option>'+
      progs.map(function(p){return '<option'+(p===prog?' selected':'')+'>'+esc(p)+'</option>';}).join('')+'</select>'+
    '<label style="margin-right:8px">ערוץ:</label><select onchange="window._repChan=this.value;renderReport()"><option value="">הכל</option>'+
      channels.map(function(c){return '<option'+(c===chan?' selected':'')+'>'+esc(c)+'</option>';}).join('')+'</select>'+
    '<span style="color:var(--muted);margin-right:auto">סה״כ '+rows.length+' פניות</span></div>';
  var chanHtml = Object.keys(byChan).sort(function(a,b){return byChan[b]-byChan[a];}).map(function(c){
    return '<span class="pill" style="margin-left:6px;font-size:12px">'+esc(c)+': '+byChan[c]+'</span>';
  }).join('');
  var rowsHtml = dates.map(function(d){
    var n=byDay[d];
    return '<tr><td style="white-space:nowrap">'+esc(d)+'</td><td style="width:75%"><span class="barfill" style="width:'+(n/max*100)+'%"></span> '+n+'</td></tr>';
  }).join('');
  host.innerHTML = bar+
    '<div class="panel" style="margin-bottom:12px"><h2>פילוח לפי ערוץ</h2>'+(chanHtml||'<span style="color:var(--muted)">אין נתונים</span>')+'</div>'+
    '<div class="panel"><h2>פניות לפי יום</h2>'+(dates.length?'<table class="funnel">'+rowsHtml+'</table>':'<div class="empty">אין פניות בטווח</div>')+'</div>';
}

function copyTpl(){
  var ta = document.getElementById('tplBody'); if(!ta) return;
  ta.removeAttribute('readonly'); ta.focus(); ta.select(); ta.setSelectionRange(0, 99999);
  try { document.execCommand('copy'); toast('הטקסט הועתק'); } catch(e){ toast('בחר/י והעתק/י ידנית'); }
  ta.setAttribute('readonly','');
}

function closeOv(){ document.getElementById('ov').classList.remove('show'); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(function(){t.style.display='none';},2600); }
function err(e){ toast('שגיאה: '+(e.message||e)); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
document.getElementById('ov').onclick=function(e){ if(e.target===this) closeOv(); };
load();
</script>
